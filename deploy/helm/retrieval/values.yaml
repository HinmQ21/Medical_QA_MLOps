replicaCount: 1

image:
  repository: ghcr.io/hinmq21/medical-qa-retrieval
  tag: latest
  pullPolicy: IfNotPresent

initImage:
  repository: ghcr.io/hinmq21/medical-qa-pipeline-init
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8001

serviceAccount:
  create: true
  name: medical-qa-retrieval
  gcpServiceAccount: ""

# fsGroup makes the artifacts PVC group-writable so the non-root container can
# write the dvc-pulled KG + HF cache (otherwise dvc pull hits Permission denied).
podSecurityContext:
  fsGroup: 1000

persistence:
  storageClassName: ""
  size: 5Gi
  mountPath: /mnt/artifacts

env:
  retrievalBackend: kg
  retrievalDevice: cpu
  kgEncoderModel: abhinand/MedEmbed-small-v0.1
  kgDataDir: /mnt/artifacts/demo/kg
  hfHome: /mnt/artifacts/hf
  sentenceTransformersHome: /mnt/artifacts/hf/sentence-transformers

dvc:
  bucket: medical-qa-dvc-REPLACE-ME
  yaml: |
    stages: {}
  lock: |
    schema: '2.0'
  artifactsDvc: |
    outs: []

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

autoscaling:
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
