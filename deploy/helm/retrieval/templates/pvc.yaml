apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medical-qa-retrieval-artifacts
spec:
  accessModes:
    - ReadWriteOnce
{{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
{{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
