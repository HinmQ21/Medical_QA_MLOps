apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-qa-ui
  labels:
    app.kubernetes.io/name: medical-qa-ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: medical-qa-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: medical-qa-ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: medical-qa-ui-config
          env:
            # Gateway API key, reused from the nginx Secret; attached server-side.
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: API_KEY
          ports:
            - name: http
              containerPort: 8501
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
