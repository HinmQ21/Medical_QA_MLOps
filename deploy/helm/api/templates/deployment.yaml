apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-qa-api
  labels:
    app.kubernetes.io/name: medical-qa-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: medical-qa-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: medical-qa-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: medical-qa-api-config
          env:
            # Optional: only the vllm backend needs it. The mock demo leaves the
            # secret absent; optional=true keeps the pod schedulable without it.
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: medical-qa-llm-key
                  key: API_KEY
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            # /ready performs a live backend health_check() (GET {LLM_BASE_URL}/models)
            # with a 5s client timeout; the probe timeout must exceed it or a healthy
            # but slow vllm tunnel gets marked NotReady at the 1s default.
            timeoutSeconds: 6
            failureThreshold: 3
          resources:
{{ toYaml .Values.resources | indent 12 }}
