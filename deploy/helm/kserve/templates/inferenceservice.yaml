apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: medical-qa-kserve
  annotations:
    serving.kserve.io/deploymentMode: {{ .Values.deploymentMode | quote }}
spec:
  predictor:
    minReplicas: {{ .Values.minReplicas }}
    containers:
      - name: kserve-container
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # The image's entrypoint is llama-server; these are appended as flags.
        args:
          - "-hf"
          - {{ .Values.model.hfRepo | quote }}
          - "--alias"
          - {{ .Values.model.servedName | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8080"
          - "--ctx-size"
          - {{ .Values.model.contextSize | quote }}
          - "--threads"
          - {{ .Values.model.threads | quote }}
          - "--cont-batching"
          - "--jinja"
        env:
          # -hf downloads into $LLAMA_CACHE; keep it on a writable volume so the
          # image's default user (whatever it is) can write the GGUF.
          - name: LLAMA_CACHE
            value: /models
        ports:
          - containerPort: 8080
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          # GGUF download (~1.1 GB) + load can take minutes on a cold node:
          # 10 + 60*10 = up to ~10 min before the pod is failed.
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 60
        readinessProbe:
          # /health returns 503 while the single inference slot is busy; readiness
          # must not flap mid-generation, so probe /v1/models (200 once the model is
          # loaded, regardless of slot state). startupProbe stays on /health.
          httpGet:
            path: /v1/models
            port: 8080
          periodSeconds: 10
        volumeMounts:
          - name: model-cache
            mountPath: /models
        resources:
{{ toYaml .Values.resources | indent 10 }}
    volumes:
      - name: model-cache
        emptyDir: {}
