apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-qa-nginx
  labels:
    app.kubernetes.io/name: medical-qa-nginx
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: medical-qa-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: medical-qa-nginx
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default "medical-qa-nginx-api-key" }}
                  key: API_KEY
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: medical-qa-nginx-config
