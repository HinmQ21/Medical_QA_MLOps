name: Demo Down (GKE)

on:
  workflow_dispatch:
    inputs:
      llm_host:
        description: Which demo cluster to tear down (dgx = Autopilot medical-qa; in-cluster = Standard medical-qa-llm)
        required: true
        type: choice
        options:
          - dgx
          - in-cluster
        default: dgx
      delete_bucket:
        description: Also delete the GCS DVC bucket (durable KG storage)
        required: true
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  demo-down:
    runs-on: ubuntu-latest
    environment: gke-demo
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      K8S_NAMESPACE: medical-qa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy tools
        run: make install-deploy-tools

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set cluster topology from llm_host
        run: |
          if [ "${{ inputs.llm_host }}" = "in-cluster" ]; then
            { echo "GKE_CLUSTER=medical-qa-llm"; echo "GKE_LOCATION=asia-southeast1-a"; } >> "$GITHUB_ENV"
          else
            { echo "GKE_CLUSTER=medical-qa"; echo "GKE_LOCATION=asia-southeast1"; } >> "$GITHUB_ENV"
          fi

      - name: Get cluster credentials
        continue-on-error: true
        run: gcloud container clusters get-credentials "$GKE_CLUSTER" --location "$GKE_LOCATION"

      - name: Release LoadBalancer and delete cluster
        run: bash scripts/cloud/teardown.sh

      - name: Optionally delete the DVC bucket
        if: ${{ inputs.delete_bucket == 'true' }}
        run: gcloud storage rm -r "gs://${GCP_PROJECT}-medical-qa-dvc"
