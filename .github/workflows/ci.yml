name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io/hinmq21

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: make install-pipeline

      - name: Install deploy tools
        run: make install-deploy-tools

      - name: Helm lint
        run: make helm-lint

      - name: Helm template
        run: make helm-template

      - name: Pytest
        run: .venv/bin/pytest --cov=medical_qa_platform --cov-report=term-missing --cov-fail-under=80

  # Build the four images in parallel (one matrix job each), only after tests
  # pass. Each builds exactly once with a per-image GHA layer cache; on main it
  # pushes (:sha + :latest), on PRs it just loads to validate. Wall-clock is the
  # slowest single image, not the sum.
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: api, dockerfile: docker/api.Dockerfile }
          - { image: retrieval, dockerfile: docker/retrieval.Dockerfile }
          - { image: kserve-mock, dockerfile: docker/kserve-mock.Dockerfile }
          - { image: pipeline-init, dockerfile: docker/pipeline-init.Dockerfile }
          - { image: ui, dockerfile: docker/ui.Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.image }} image
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            OUT="-t $REGISTRY/medical-qa-${{ matrix.image }}:latest --push"
          else
            OUT="--load"
          fi
          docker buildx build --platform linux/amd64 -f ${{ matrix.dockerfile }} \
            --cache-from type=gha,scope=${{ matrix.image }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.image }} \
            -t $REGISTRY/medical-qa-${{ matrix.image }}:${{ github.sha }} \
            $OUT .
