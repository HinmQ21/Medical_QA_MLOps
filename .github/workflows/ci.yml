name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io/hinmq21

jobs:
  test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: make install-pipeline

      - name: Install deploy tools
        run: make install-deploy-tools

      - name: Helm lint
        run: make helm-lint

      - name: Helm template
        run: make helm-template

      - name: Pytest
        run: .venv/bin/pytest --cov=medical_qa_platform --cov-report=term-missing --cov-fail-under=80

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On main: build once and push (:sha + :latest). On PRs: build once and load
      # (validate only). GHA layer cache means unchanged dependency layers (CPU
      # torch, faiss, etc.) are reused across runs instead of rebuilt every time.
      - name: Select push vs load
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "PUSH=true" >> "$GITHUB_ENV"
          else
            echo "PUSH=false" >> "$GITHUB_ENV"
          fi

      - name: Build API image
        run: |
          docker buildx build --platform linux/amd64 -f docker/api.Dockerfile \
            --cache-from type=gha,scope=api --cache-to type=gha,mode=max,scope=api \
            -t $REGISTRY/medical-qa-api:${{ github.sha }} \
            $([ "$PUSH" = true ] && echo "-t $REGISTRY/medical-qa-api:latest --push" || echo "--load") .

      - name: Build retrieval image
        run: |
          docker buildx build --platform linux/amd64 -f docker/retrieval.Dockerfile \
            --cache-from type=gha,scope=retrieval --cache-to type=gha,mode=max,scope=retrieval \
            -t $REGISTRY/medical-qa-retrieval:${{ github.sha }} \
            $([ "$PUSH" = true ] && echo "-t $REGISTRY/medical-qa-retrieval:latest --push" || echo "--load") .

      - name: Build KServe mock image
        run: |
          docker buildx build --platform linux/amd64 -f docker/kserve-mock.Dockerfile \
            --cache-from type=gha,scope=kserve-mock --cache-to type=gha,mode=max,scope=kserve-mock \
            -t $REGISTRY/medical-qa-kserve-mock:${{ github.sha }} \
            $([ "$PUSH" = true ] && echo "-t $REGISTRY/medical-qa-kserve-mock:latest --push" || echo "--load") .

      - name: Build DVC init image
        run: |
          docker buildx build --platform linux/amd64 -f docker/pipeline-init.Dockerfile \
            --cache-from type=gha,scope=pipeline-init --cache-to type=gha,mode=max,scope=pipeline-init \
            -t $REGISTRY/medical-qa-pipeline-init:${{ github.sha }} \
            $([ "$PUSH" = true ] && echo "-t $REGISTRY/medical-qa-pipeline-init:latest --push" || echo "--load") .
