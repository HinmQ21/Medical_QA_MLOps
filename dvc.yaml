stages:
  build_kg_smoke:
    cmd: .venv/bin/python -m mlops.pipelines.build_smoke_kg --profile smoke
    deps:
      - mlops/pipelines/build_smoke_kg.py
      - mlops/pipelines/profiles.py
      - params.yaml
    outs:
      - artifacts/smoke/kg/medical_hg.json
      - artifacts/smoke/kg/hedge_ids.json
      - artifacts/smoke/kg/entity_names.json
      - artifacts/smoke/kg/retrieval_fixture.json
      - artifacts/smoke/kg/manifest.json

  eval_smoke:
    cmd: .venv/bin/python -m mlops.pipelines.eval_smoke --profile smoke
    deps:
      - mlops/pipelines/eval_smoke.py
      - mlops/pipelines/profiles.py
      - mlops/smoke_data/medical_mcq.jsonl
      - artifacts/smoke/kg/retrieval_fixture.json
      - params.yaml
    outs:
      - artifacts/smoke/eval_predictions.jsonl
      - artifacts/smoke/eval_metrics.json

  register_smoke_model:
    cmd: .venv/bin/python -m mlops.mlflow_register --profile smoke --dry-run
    deps:
      - mlops/mlflow_register.py
      - artifacts/smoke/eval_metrics.json
      - artifacts/smoke/eval_predictions.jsonl
      - params.yaml
    outs:
      - artifacts/smoke/mlflow_register_dry_run.json

  build_demo_kg:
    cmd: .venv/bin/python -m mlops.pipelines.build_demo_kg --out-dir artifacts/demo/kg
    deps:
      - mlops/pipelines/build_demo_kg.py
    outs:
      - artifacts/demo/kg/index_hyperedge.bin
      - artifacts/demo/kg/index_entity.bin
      - artifacts/demo/kg/hedge_ids.npy
      - artifacts/demo/kg/entity_names.npy
      - artifacts/demo/kg/medical_hg.json
      - artifacts/demo/kg/manifest.json

  full_build_kg:
    cmd: .venv/bin/python -m mlops.pipelines.run_full --profile full --stages build_kg
    deps:
      - mlops/pipelines/run_full.py
      - mlops/pipelines/full_stages.py
      - mlops/pipelines/full_config.py
      - params.yaml
    outs:
      - artifacts/full/kg:
          cache: false

  full_stage1:
    cmd: .venv/bin/python -m mlops.pipelines.run_full --profile full --stages stage1
    deps:
      - mlops/pipelines/full_stages.py
      - params.yaml
    outs:
      - artifacts/full/outputs/stage1:
          cache: false

  full_stage1_5:
    cmd: .venv/bin/python -m mlops.pipelines.run_full --profile full --stages stage1_5
    deps:
      - mlops/pipelines/full_stages.py
      - params.yaml
      - artifacts/full/outputs/stage1
    outs:
      - artifacts/full/outputs/stage1_5_merged:
          cache: false

  full_stage2:
    cmd: .venv/bin/python -m mlops.pipelines.run_full --profile full --stages stage2
    deps:
      - mlops/pipelines/full_stages.py
      - params.yaml
      - artifacts/full/outputs/stage1_5_merged
      - artifacts/full/kg
    outs:
      - artifacts/full/outputs/stage2_merged:
          cache: false

  full_eval:
    cmd: .venv/bin/python -m mlops.pipelines.run_full --profile full --stages eval
    deps:
      - mlops/pipelines/full_stages.py
      - params.yaml
      - artifacts/full/outputs/stage2_merged
      - artifacts/full/kg
    outs:
      - artifacts/full/eval/eval.json:
          cache: false

  full_register:
    cmd: .venv/bin/python -m mlops.pipelines.run_full --profile full --stages register
    deps:
      - mlops/pipelines/run_full.py
      - params.yaml
      - artifacts/full/eval/eval.json
    outs:
      - artifacts/full/run_full_receipt.json:
          cache: false
